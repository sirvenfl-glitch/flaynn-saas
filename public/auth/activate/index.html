<!DOCTYPE html>
<html lang="fr" dir="ltr" style="background:#030407">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#030407">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flaynn">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <title>Activer votre compte · Flaynn</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/defaut.css">
  <link rel="stylesheet" href="/auth/auth.css">
</head>
<body class="auth-body">

  <div id="ambient-bg" class="ambient-bg" aria-hidden="true"></div>

  <div class="auth-wrap">
    <div class="logo-container">
      <a href="/">
        <img src="/icons/logo.png" alt="" width="95" height="114" class="logo-img" aria-hidden="true">
      </a>
    </div>

    <article class="card-glass auth-card">
      <h1 class="auth-title" id="auth-title">Activer votre compte</h1>
      <p class="auth-subtitle" id="auth-subtitle">Vérification du lien d'invitation…</p>

      <!-- État d'erreur (token invalide / expiré / utilisé) -->
      <div id="activate-error-state" class="auth-forgot-panel" hidden>
        <p id="activate-error-text" class="auth-forgot-panel__text"></p>
        <div class="form-actions" style="gap: var(--space-3); display: flex; flex-direction: column;">
          <a href="/scoring/?invite_only=1" class="btn-primary btn-gradient auth-submit" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none;">
            <span class="btn__text">Soumettre un nouveau scoring</span>
          </a>
          <a href="/auth/" class="auth-forgot__link" style="text-align:center;">J'ai déjà un compte</a>
        </div>
      </div>

      <!-- Formulaire activation -->
      <form id="activate-form" novalidate hidden>
        <!-- Email (lecture seule, vient du token) -->
        <div class="field">
          <label for="email" class="field__label">Email</label>
          <input type="email" id="email" name="email" class="field__input" readonly autocomplete="email">
          <p class="field__hint" id="email-hint">Lié à votre soumission de scoring.</p>
        </div>

        <!-- Nom -->
        <div class="field">
          <label for="name" class="field__label">Nom complet</label>
          <input type="text" id="name" name="name" class="field__input" required minlength="2" maxlength="100" autocomplete="name" placeholder="Votre nom">
        </div>

        <!-- Mot de passe -->
        <div class="field">
          <label for="password" class="field__label">
            Mot de passe
            <button type="button" class="auth-toggle-pw" aria-label="Afficher le mot de passe">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </label>
          <input type="password" id="password" name="password" class="field__input" required minlength="12" autocomplete="new-password" placeholder="Min. 12 caractères">
        </div>

        <!-- Erreur globale -->
        <div id="activate-form-error" class="field__error" role="alert"></div>

        <!-- Submit -->
        <div class="form-actions">
          <button type="submit" class="btn-primary btn-gradient auth-submit" id="submit-btn">
            <span class="btn__text">Créer mon compte</span>
          </button>
        </div>
      </form>

      <div class="auth-footer-link">
        <a href="/" class="auth-back-link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M13 8H3M7 4l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Retour à l'accueil
        </a>
      </div>
    </article>
  </div>

  <div id="page-loader" aria-hidden="true">
    <canvas id="loader-starfield"></canvas>
    <img src="/icons/icon-192.png" alt="" class="loader-icon" width="48" height="48">
  </div>

  <script type="module" src="/register-sw.js"></script>
  <script src="/auth/activate/app.js" type="module"></script>
  <script src="/js/page-loader.js" defer></script>
</body>
</html>
