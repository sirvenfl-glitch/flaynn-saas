<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0d14">
  <title>Espace Membre — Flaynn</title>
  <!-- On réutilise le CSS principal pour hériter de la DA Dark Clarity -->
  <link rel="stylesheet" href="/css/defaut.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--surface-void); }
    .auth-wrap { width: 100%; max-width: 440px; padding: var(--space-4); }
    .auth-card { padding: var(--space-6) var(--space-5); }
    .auth-tabs { display: flex; gap: var(--space-4); border-bottom: 1px solid var(--border-default); margin-bottom: var(--space-5); padding-bottom: var(--space-2); }
    .auth-tab { background: none; border: none; padding: 0 var(--space-2) var(--space-2); color: var(--text-secondary); font: 500 1rem var(--font-body); cursor: pointer; transition: color 0.3s; position: relative; }
    .auth-tab.is-active { color: var(--text-primary); }
    .auth-tab.is-active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent-violet); border-radius: 2px 2px 0 0; }
    .logo-container { text-align: center; margin-bottom: var(--space-6); }
    .logo-container a { color: var(--text-primary); text-decoration: none; font: 900 1.5rem var(--font-display); letter-spacing: -0.03em; }
    .form-actions { margin-top: var(--space-5); }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="logo-container">
      <a href="/">Flaynn.</a>
    </div>

    <article class="card-glass auth-card">
      <nav class="auth-tabs" aria-label="Authentification">
        <button type="button" class="auth-tab is-active" data-tab="login">Connexion</button>
        <button type="button" class="auth-tab" data-tab="register">Inscription</button>
      </nav>

      <form id="auth-form" novalidate>
        <div class="field" id="field-name" hidden>
          <label for="name" class="field__label">Nom de la startup ou complet</label>
          <input type="text" id="name" name="name" class="field__input" placeholder="ex: Flaynn SaaS">
        </div>
        <div class="field">
          <label for="email" class="field__label">Email professionnel</label>
          <input type="email" id="email" name="email" class="field__input" required placeholder="contact@flaynn.fr">
        </div>
        <div class="field">
          <label for="password" class="field__label">Mot de passe</label>
          <input type="password" id="password" name="password" class="field__input" required placeholder="••••••••">
        </div>

        <div id="auth-error" class="field__error" role="alert"></div>

        <div class="form-actions">
          <button type="submit" class="btn--primary" id="submit-btn">
            <span class="btn__text">Se connecter</span>
          </button>
        </div>
      </form>
    </article>
  </div>

  <script src="/auth/app.js" type="module"></script>
</body>
</html>
