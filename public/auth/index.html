<!DOCTYPE html>
<html lang="fr" dir="ltr" style="background:#030407">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#030407">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flaynn">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <title>Espace Membre · Flaynn</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/defaut.css">
  <link rel="stylesheet" href="/auth/auth.css">
</head>
<body class="auth-body">

  <div id="ambient-bg" class="ambient-bg" aria-hidden="true"></div>

  <div class="auth-wrap">
    <div class="logo-container">
      <a href="/">
        <img src="/icons/logo.png" alt="" width="95" height="114" class="logo-img" aria-hidden="true">
      </a>
    </div>

    <article class="card-glass auth-card">
      <h1 class="auth-title">Espace membre</h1>
      <p class="auth-subtitle">Connectez-vous pour accéder à vos analyses.</p>

      <form id="auth-form" novalidate>
        <!-- Email -->
        <div class="field">
          <label for="email" class="field__label">Email professionnel</label>
          <input type="email" id="email" name="email" class="field__input" required autocomplete="email" placeholder="vous@startup.com">
        </div>

        <!-- Mot de passe -->
        <div class="field">
          <label for="password" class="field__label">
            Mot de passe
            <button type="button" class="auth-toggle-pw" aria-label="Afficher le mot de passe">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </label>
          <input type="password" id="password" name="password" class="field__input" required minlength="12" autocomplete="current-password" placeholder="Min. 12 caractères">
        </div>

        <!-- Erreur globale -->
        <div id="auth-error" class="field__error" role="alert"></div>

        <!-- Mot de passe oublie (login uniquement) -->
        <div class="auth-forgot" id="auth-forgot">
          <button type="button" class="auth-forgot__link" id="forgot-pw-btn">Mot de passe oublié ?</button>
        </div>

        <!-- Submit -->
        <div class="form-actions">
          <button type="submit" class="btn-primary btn-gradient auth-submit" id="submit-btn">
            <span class="btn__text">Se connecter</span>
          </button>
        </div>
      </form>

      <!-- Panneau mot de passe oublie -->
      <div id="forgot-panel" class="auth-forgot-panel" hidden>
        <h2 class="auth-forgot-panel__title">Réinitialiser le mot de passe</h2>
        <p class="auth-forgot-panel__text">Entrez votre email. Si un compte existe, vous recevrez un lien de réinitialisation.</p>
        <form id="forgot-form" novalidate>
          <div class="field">
            <label for="forgot-email" class="field__label">Email</label>
            <input type="email" id="forgot-email" class="field__input" required placeholder="vous@startup.com">
          </div>
          <div id="forgot-message" class="field__error" role="alert"></div>
          <div class="form-actions" style="gap: var(--space-3); display: flex; flex-direction: column;">
            <button type="submit" class="btn-primary btn-gradient auth-submit" id="forgot-submit-btn">
              <span class="btn__text">Envoyer le lien</span>
            </button>
            <button type="button" class="auth-forgot__link" id="forgot-back-btn">Retour à la connexion</button>
          </div>
        </form>
      </div>

      <div class="auth-footer-link">
        <a href="/" class="auth-back-link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M13 8H3M7 4l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Retour à l'accueil
        </a>
      </div>
    </article>
  </div>

  <div id="page-loader" aria-hidden="true">
    <canvas id="loader-starfield"></canvas>
    <img src="/icons/icon-192.png" alt="" class="loader-icon" width="48" height="48">
  </div>

  <script type="module" src="/register-sw.js"></script>
  <script src="/auth/app.js" type="module"></script>
  <script>(function(){var loader=document.getElementById('page-loader');if(!loader)return;var canvas=document.getElementById('loader-starfield');var ctx=canvas.getContext('2d');var stars=[];var raf;function initStars(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;stars=Array.from({length:120},function(){return{x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+0.3,speed:Math.random()*0.4+0.1,opacity:Math.random()*0.7+0.3}});}function drawStars(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(function(s){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+s.opacity+')';ctx.fill();s.y+=s.speed;if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;}});raf=requestAnimationFrame(drawStars);}document.addEventListener('click',function(e){var link=e.target.closest('a[href]');if(!link)return;var href=link.getAttribute('href');if(!href||href.startsWith('#')||href.startsWith('http')||href.startsWith('mailto')||link.target==='_blank')return;var timer=setTimeout(function(){initStars();drawStars();loader.classList.add('visible');},300);window.addEventListener('beforeunload',function(){clearTimeout(timer);},{once:true});});window.addEventListener('pageshow',function(){loader.classList.remove('visible');cancelAnimationFrame(raf);});})()</script>
</body>
</html>
