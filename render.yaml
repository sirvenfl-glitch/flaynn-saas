# Render Blueprint — API Fastify + fichiers statiques (public/)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flaynn-api
    env: docker
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: N8N_SCORE_WEBHOOK_URL
        sync: false
