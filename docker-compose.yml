version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flaynn_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flaynn.fr
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
      
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: